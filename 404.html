<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script>
      (function () {
        try {
          var t = localStorage.getItem("theme");
          if (t === "light" || t === "dark") {
            document.documentElement.setAttribute("data-theme", t);
          }
        } catch (e) {}
        document.documentElement.classList.add("js");
      })();
    </script>
    <title>Page not found — Alex Rabaev</title>
    <meta name="description" content="That page doesn't exist." />
    <meta name="robots" content="noindex" />
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="/css/main.css" />
    <style>
      .notfound {
        min-height: 70svh;
        display: grid;
        place-content: center;
        text-align: center;
        gap: 1rem;
      }
      .notfound__code {
        font-family: var(--font-mono);
        color: var(--accent);
        font-size: var(--font-size-md);
      }
    </style>
  </head>
  <body>
    <main id="main" class="u-container notfound">
      <p class="notfound__code">404</p>
      <h1>This page wandered off.</h1>
      <p class="u-lead" style="margin-inline:auto">
        The page you're looking for doesn't exist or has moved.
      </p>
      <p><a class="btn btn--primary" href="/">Back to home</a></p>
    </main>
  </body>
</html>
